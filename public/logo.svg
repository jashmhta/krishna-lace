<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7d2230"/>
      <stop offset="0.5" stop-color="#5e1a25"/>
      <stop offset="1" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="rim" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="gold" x1="140" y1="140" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d4af5e"/>
      <stop offset="0.5" stop-color="#b08d3e"/>
      <stop offset="1" stop-color="#8a6e2e"/>
    </linearGradient>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Glass circle background -->
  <circle cx="256" cy="256" r="240" fill="url(#glass)"/>
  <!-- Glass rim highlight -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#rim)" stroke-width="3"/>
  <!-- Inner highlight arc -->
  <path d="M 120 180 A 160 160 0 0 1 392 180" stroke="white" stroke-opacity="0.15" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Bottom shadow arc -->
  <path d="M 130 350 A 160 160 0 0 0 382 350" stroke="black" stroke-opacity="0.2" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- "KLH" monogram in gold -->
  <text x="256" y="270" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-size="130" font-weight="700" fill="url(#gold)" letter-spacing="-4">KLH</text>

  <!-- Scissors icon below monogram -->
  <g transform="translate(256, 340)" filter="url(#innerGlow)">
    <circle cx="-16" cy="0" r="14" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <circle cx="16" cy="0" r="14" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <line x1="-6" y1="-4" x2="28" y2="22" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
    <line x1="6" y1="-4" x2="-28" y2="22" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Decorative dots (lace hole motif) -->
  <circle cx="256" cy="150" r="3" fill="url(#gold)" opacity="0.6"/>
  <circle cx="200" cy="165" r="2" fill="url(#gold)" opacity="0.4"/>
  <circle cx="312" cy="165" r="2" fill="url(#gold)" opacity="0.4"/>
  <circle cx="160" cy="190" r="2" fill="url(#gold)" opacity="0.3"/>
  <circle cx="352" cy="190" r="2" fill="url(#gold)" opacity="0.3"/>
</svg>
